name: KOVCHEG migration regression diagnostics

on:
  push:
    branches: [blog-v3.4-layout-widgets]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  migration-regression:
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: MariaDB
            image: mariadb:11
            port: 3306
            password: regression_maria
            health: healthcheck.sh --connect --innodb_initialized
          - label: MySQL
            image: mysql:8.4
            port: 3307
            password: regression_mysql
            health: mysqladmin ping -h 127.0.0.1 -uroot -pregression_mysql --silent
    runs-on: ubuntu-latest
    services:
      database:
        image: ${{ matrix.image }}
        env:
          MARIADB_ROOT_PASSWORD: ${{ matrix.password }}
          MARIADB_DATABASE: regression_ci
          MYSQL_ROOT_PASSWORD: ${{ matrix.password }}
          MYSQL_DATABASE: regression_ci
        ports:
          - ${{ matrix.port }}:3306
        options: >-
          --health-cmd="${{ matrix.health }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Prepare complete migrated database
        shell: bash
        run: |
          php -r '$schema=require "database/schema.php"; file_put_contents("/tmp/schema.sql",$schema);'
          MYSQL_PWD='${{ matrix.password }}' mysql --protocol=tcp -h 127.0.0.1 -P '${{ matrix.port }}' -u root regression_ci < /tmp/schema.sql
          for migration in $(find migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            echo "APPLY $migration"
            MYSQL_PWD='${{ matrix.password }}' mysql --show-warnings --protocol=tcp -h 127.0.0.1 -P '${{ matrix.port }}' -u root regression_ci < "$migration"
          done
      - name: Repeat Builder migration
        run: MYSQL_PWD='${{ matrix.password }}' mysql --show-warnings --protocol=tcp -h 127.0.0.1 -P '${{ matrix.port }}' -u root regression_ci < migrations/20260722_blog_builder.sql
      - name: Repeat Growth migration
        run: MYSQL_PWD='${{ matrix.password }}' mysql --show-warnings --protocol=tcp -h 127.0.0.1 -P '${{ matrix.port }}' -u root regression_ci < migrations/20260722_blog_growth.sql
      - name: Repeat Layout migration
        run: MYSQL_PWD='${{ matrix.password }}' mysql --show-warnings --protocol=tcp -h 127.0.0.1 -P '${{ matrix.port }}' -u root regression_ci < migrations/20260722_blog_layout_widgets.sql
      - name: Verify legacy content tables
        run: MYSQL_PWD='${{ matrix.password }}' mysql --protocol=tcp -h 127.0.0.1 -P '${{ matrix.port }}' -u root -N -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='regression_ci' AND table_name IN ('content_entries','content_comments','content_patterns','content_autosaves','content_redirects','content_subscriptions','content_publication_log');" | tee /tmp/count | grep -qx 7
      - name: Verify media columns
        run: MYSQL_PWD='${{ matrix.password }}' mysql --protocol=tcp -h 127.0.0.1 -P '${{ matrix.port }}' -u root -N -e "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema='regression_ci' AND table_name='media_library' AND column_name IN ('folder_id','caption','usage_count');" | tee /tmp/count | grep -qx 3
      - name: Verify module columns
        run: MYSQL_PWD='${{ matrix.password }}' mysql --protocol=tcp -h 127.0.0.1 -P '${{ matrix.port }}' -u root -N -e "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema='regression_ci' AND table_name='modules' AND column_name IN ('manifest_json','package_format','health_status');" | tee /tmp/count | grep -qx 3
      - name: Verify Layout tables and seed
        shell: bash
        run: |
          MYSQL_PWD='${{ matrix.password }}' mysql --protocol=tcp -h 127.0.0.1 -P '${{ matrix.port }}' -u root -N -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='regression_ci' AND table_name IN ('site_layouts','site_widget_instances','site_widget_placements','site_layout_revisions');" | grep -qx 4
          MYSQL_PWD='${{ matrix.password }}' mysql --protocol=tcp -h 127.0.0.1 -P '${{ matrix.port }}' -u root -N regression_ci -e "SELECT COUNT(*) FROM site_widget_instances WHERE system_key IN ('default-logo','default-menu','default-account','default-subscription');" | grep -qx 4
          MYSQL_PWD='${{ matrix.password }}' mysql --protocol=tcp -h 127.0.0.1 -P '${{ matrix.port }}' -u root -N regression_ci -e "SELECT COUNT(*) FROM site_widget_placements;" | grep -qx 4