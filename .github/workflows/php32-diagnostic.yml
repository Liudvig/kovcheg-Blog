name: KOVCHEG Blog 3.2 PHP diagnostic

on:
  push:
    branches: [blog-v3.2-builder]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Lint BlogBuilder
        continue-on-error: true
        run: php -l app/BlogBuilder.php
      - name: Lint BlogStudio32
        if: always()
        continue-on-error: true
        run: php -l app/BlogStudio32.php
      - name: Lint BlogModules
        if: always()
        continue-on-error: true
        run: php -l app/BlogModules.php
      - name: Lint builder routes
        if: always()
        continue-on-error: true
        run: php -l routes/blog-builder.php
      - name: Lint editor view
        if: always()
        continue-on-error: true
        run: php -l views/studio/editor.php
      - name: Lint new Studio views
        if: always()
        run: find views/studio -maxdepth 1 -type f \( -name 'patterns.php' -o -name 'users.php' -o -name 'presets.php' -o -name 'modules.php' \) -print0 | xargs -0 -n1 php -l
