name: KOVCHEG Blog 3.2 PHP diagnostic

on:
  push:
    branches: [blog-v3.2-builder]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Report exact PHP lint failure
        shell: bash
        run: |
          failed=0
          while IFS= read -r -d '' file; do
            if ! output=$(php -l "$file" 2>&1); then
              echo "FAILED_FILE=$file"
              echo "$output"
              echo "::error file=$file::$output"
              failed=1
              break
            fi
          done < <(find . -path './.git' -prune -o -path './vendor' -prune -o -type f -name '*.php' -print0)
          exit "$failed"
