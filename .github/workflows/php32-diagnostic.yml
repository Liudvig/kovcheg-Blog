name: KOVCHEG Blog 3.2 PHP diagnostic

on:
  push:
    branches: [blog-v3.2-builder]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Lint BlogBuilder
        continue-on-error: true
        run: php -l app/BlogBuilder.php
      - name: Lint BlogStudio32
        if: always()
        continue-on-error: true
        run: php -l app/BlogStudio32.php
      - name: Lint BlogModules
        if: always()
        continue-on-error: true
        run: php -l app/BlogModules.php
      - name: Lint bootstrap and index
        if: always()
        continue-on-error: true
        run: php -l app/bootstrap.php && php -l index.php
      - name: Lint builder routes
        if: always()
        continue-on-error: true
        run: php -l routes/blog-builder.php
      - name: Lint editor view
        if: always()
        continue-on-error: true
        run: php -l views/studio/editor.php
      - name: Lint Studio layout
        if: always()
        continue-on-error: true
        run: php -l views/studio/layout.php
      - name: Lint Studio media
        if: always()
        continue-on-error: true
        run: php -l views/studio/media.php
      - name: Lint new Studio views individually
        if: always()
        continue-on-error: true
        run: |
          php -l views/studio/patterns.php
          php -l views/studio/users.php
          php -l views/studio/presets.php
          php -l views/studio/modules.php
      - name: Lint portfolio theme
        if: always()
        run: find themes/kovcheg-portfolio -maxdepth 1 -type f -name '*.php' -print0 | xargs -0 -n1 php -l
