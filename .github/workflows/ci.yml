name: KOVCHEG Blog checks

on:
  push:
    branches: [main, blog-v1-foundation, blog-v3.2-builder, hotfix/mysql-compatible-builder-migration, blog-v3.3-growth, hotfix/3.3-bootstrap-runtime, hotfix/3.3-http-route-smoke, hotfix/3.3-original-uri-proxy, hotfix/3.3-query-route-fallback]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: kovcheg_ci_root
          MARIADB_DATABASE: kovcheg_ci
        ports: [3306:3306]
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: kovcheg_mysql_root
          MYSQL_DATABASE: kovcheg_mysql_ci
        ports: [3307:3306]
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pkovcheg_mysql_root --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: mbstring, fileinfo, openssl, pdo_mysql, zip
      - name: Lint PHP
        shell: bash
        run: |
          find . -path './.git' -prune -o -path './vendor' -prune -o -type f -name '*.php' -print0 | xargs -0 -r -n1 php -l
      - name: Check JavaScript syntax
        run: |
          files=$(find assets themes -type f -name '*.js' 2>/dev/null || true)
          if [ -n "$files" ]; then while IFS= read -r file; do node --check "$file"; done <<< "$files"; fi
      - name: Validate JSON
        shell: bash
        run: |
          while IFS= read -r -d '' file; do php -r 'json_decode(file_get_contents($argv[1]), true, 512, JSON_THROW_ON_ERROR);' "$file"; done < <(find . -path './.git' -prune -o -type f -name '*.json' -print0)
      - name: Validate schema and migrations on MariaDB and MySQL
        shell: bash
        run: |
          php -r '$schema=require "database/schema.php"; if(!is_string($schema)||trim($schema)==="") exit(1); file_put_contents("/tmp/kovcheg-schema.sql",$schema);'
          apply_database() {
            local label="$1" port="$2" database="$3" password="$4"
            echo "=== ${label}: base schema ==="
            MYSQL_PWD="$password" mysql --protocol=tcp -h 127.0.0.1 -P "$port" -u root "$database" < /tmp/kovcheg-schema.sql
            echo "=== ${label}: migrations ==="
            for migration in $(find migrations -maxdepth 1 -type f -name '*.sql' | sort); do MYSQL_PWD="$password" mysql --protocol=tcp -h 127.0.0.1 -P "$port" -u root "$database" < "$migration"; done
            MYSQL_PWD="$password" mysql --protocol=tcp -h 127.0.0.1 -P "$port" -u root "$database" < migrations/20260722_blog_builder.sql
            MYSQL_PWD="$password" mysql --protocol=tcp -h 127.0.0.1 -P "$port" -u root "$database" < migrations/20260722_blog_growth.sql
            MYSQL_PWD="$password" mysql --protocol=tcp -h 127.0.0.1 -P "$port" -u root -N -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='${database}' AND table_name IN ('content_entries','content_comments','content_patterns','content_autosaves','content_redirects','content_subscriptions','content_publication_log');" | grep -qx '7'
            MYSQL_PWD="$password" mysql --protocol=tcp -h 127.0.0.1 -P "$port" -u root -N -e "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema='${database}' AND table_name='media_library' AND column_name IN ('folder_id','caption','usage_count');" | grep -qx '3'
            MYSQL_PWD="$password" mysql --protocol=tcp -h 127.0.0.1 -P "$port" -u root -N -e "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema='${database}' AND table_name='modules' AND column_name IN ('manifest_json','package_format','health_status');" | grep -qx '3'
          }
          apply_database "MariaDB 11" 3306 kovcheg_ci kovcheg_ci_root
          apply_database "MySQL 8.4" 3307 kovcheg_mysql_ci kovcheg_mysql_root
      - name: Runtime bootstrap, CLI and HTTP route smoke tests
        shell: bash
        run: |
          mkdir -p config storage/logs storage/cache storage/uploads storage/backups storage/builds
          cat > config/config.php <<'PHP'
          <?php
          return [
              'app' => [
                  'name' => 'KOVCHEG Blog CI',
                  'url' => 'http://127.0.0.1:8099',
                  'timezone' => 'UTC',
                  'debug' => true,
                  'key' => 'base64:'.base64_encode(str_repeat('K', 32)),
              ],
              'database' => [
                  'driver' => 'mysql',
                  'host' => '127.0.0.1',
                  'port' => 3306,
                  'name' => 'kovcheg_ci',
                  'user' => 'root',
                  'password' => 'kovcheg_ci_root',
                  'charset' => 'utf8mb4',
              ],
          ];
          PHP
          php -r '$_SERVER["SCRIPT_NAME"]="cli"; require "app/bootstrap.php"; if(!class_exists("Kovcheg\\DB")) exit(1); echo "Runtime bootstrap OK\n";'
          php bin/migrate.php
          php bin/publish-scheduled.php

          php -S 127.0.0.1:8099 index.php >/tmp/kovcheg-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true; cat /tmp/kovcheg-http.log || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8099/ >/dev/null; then break; fi
            sleep 1
          done

          check_response() {
            local label="$1" expected_type="$2" code type
            shift 2
            : > /tmp/kovcheg-headers
            code=$(curl -sS -D /tmp/kovcheg-headers -o /tmp/kovcheg-response -w '%{http_code}' "$@")
            type=$(awk -F': ' 'tolower($1)=="content-type"{print tolower($2)}' /tmp/kovcheg-headers | tr -d '\r' | tail -n1)
            echo "$code $label $type"
            if [ "$code" != "200" ]; then
              echo "Response body for $label:" >&2
              cat /tmp/kovcheg-response >&2
              exit 1
            fi
            case "$type" in *"$expected_type"*) ;; *) echo "Unexpected content type for $label" >&2; cat /tmp/kovcheg-response >&2; exit 1;; esac
          }

          check_route() {
            local path="$1" expected_type="$2"
            check_response "$path" "$expected_type" "http://127.0.0.1:8099${path}"
          }

          check_header_proxy_route() {
            local path="$1" expected_type="$2"
            check_response "header-proxy:${path}" "$expected_type" -H "X-Kovcheg-Original-URI: ${path}" "http://127.0.0.1:8099/index.php"
          }

          check_query_proxy_route() {
            local path="$1" expected_type="$2" encoded
            encoded=$(php -r 'echo rawurlencode($argv[1]);' "$path")
            check_response "query-proxy:${path}" "$expected_type" "http://127.0.0.1:8099/index.php?__kovcheg_route=${encoded}"
          }

          check_route / text/html
          check_route /blog text/html
          check_route /portfolio text/html
          check_route /sitemap.xml application/xml
          check_route /feed.xml application/rss+xml
          check_route /robots.txt text/plain

          check_header_proxy_route /blog text/html
          check_header_proxy_route /portfolio text/html
          check_header_proxy_route /sitemap.xml application/xml
          check_header_proxy_route /feed.xml application/rss+xml
          check_header_proxy_route /robots.txt text/plain

          check_query_proxy_route /blog text/html
          check_query_proxy_route /portfolio text/html
          check_query_proxy_route /sitemap.xml application/xml
          check_query_proxy_route /feed.xml application/rss+xml
          check_query_proxy_route /robots.txt text/plain

          kill "$server_pid"
          wait "$server_pid" 2>/dev/null || true
          trap - EXIT
          rm -f config/config.php
      - name: Reject committed secrets and runtime data
        shell: bash
        run: |
          test ! -f config/config.php
          test ! -f .env
          if find storage/uploads storage/cache storage/logs storage/backups storage/builds -type f ! -name '.gitkeep' -print -quit 2>/dev/null | grep -q .; then echo 'Runtime or user data must not be committed.' >&2; exit 1; fi
          if grep -RInE --exclude-dir=.git --exclude='*.png' --exclude='*.jpg' --exclude='*.webp' '(BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY|AKIA[0-9A-Z]{16}|github_pat_[A-Za-z0-9_]{20,}|gh[pousr]_[A-Za-z0-9_]{30,}|sk-[A-Za-z0-9]{20,})' .; then echo 'Possible secret found.' >&2; exit 1; fi
