name: KOVCHEG Layout migration diagnostics

on:
  push:
    branches: [blog-v3.4-layout-widgets]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  mariadb-layout:
    runs-on: ubuntu-latest
    services:
      database:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: layout_root
          MARIADB_DATABASE: layout_ci
        ports: [3306:3306]
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: MariaDB base schema
        run: |
          php -r '$schema=require "database/schema.php"; file_put_contents("/tmp/schema.sql",$schema);'
          MYSQL_PWD=layout_root mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root layout_ci < /tmp/schema.sql
      - name: MariaDB apply all migrations
        run: |
          for migration in $(find migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            echo "APPLY $migration"
            MYSQL_PWD=layout_root mysql --show-warnings --protocol=tcp -h 127.0.0.1 -P 3306 -u root layout_ci < "$migration"
          done
      - name: MariaDB repeat Layout migration
        run: MYSQL_PWD=layout_root mysql --show-warnings --protocol=tcp -h 127.0.0.1 -P 3306 -u root layout_ci < migrations/20260722_blog_layout_widgets.sql
      - name: MariaDB verify Layout seed
        run: |
          MYSQL_PWD=layout_root mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root -N -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='layout_ci' AND table_name IN ('site_layouts','site_widget_instances','site_widget_placements','site_layout_revisions');" | grep -qx 4
          MYSQL_PWD=layout_root mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root -N layout_ci -e "SELECT COUNT(*) FROM site_layouts;" | grep -qx 1
          MYSQL_PWD=layout_root mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root -N layout_ci -e "SELECT COUNT(*) FROM site_widget_instances;" | grep -qx 4
          MYSQL_PWD=layout_root mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root -N layout_ci -e "SELECT COUNT(*) FROM site_widget_placements;" | grep -qx 4

  mysql-layout:
    runs-on: ubuntu-latest
    services:
      database:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: layout_root
          MYSQL_DATABASE: layout_ci
        ports: [3306:3306]
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -playout_root --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: MySQL base schema
        run: |
          php -r '$schema=require "database/schema.php"; file_put_contents("/tmp/schema.sql",$schema);'
          MYSQL_PWD=layout_root mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root layout_ci < /tmp/schema.sql
      - name: MySQL apply all migrations
        run: |
          for migration in $(find migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            echo "APPLY $migration"
            MYSQL_PWD=layout_root mysql --show-warnings --protocol=tcp -h 127.0.0.1 -P 3306 -u root layout_ci < "$migration"
          done
      - name: MySQL repeat Layout migration
        run: MYSQL_PWD=layout_root mysql --show-warnings --protocol=tcp -h 127.0.0.1 -P 3306 -u root layout_ci < migrations/20260722_blog_layout_widgets.sql
      - name: MySQL verify Layout seed
        run: |
          MYSQL_PWD=layout_root mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root -N -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='layout_ci' AND table_name IN ('site_layouts','site_widget_instances','site_widget_placements','site_layout_revisions');" | grep -qx 4
          MYSQL_PWD=layout_root mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root -N layout_ci -e "SELECT COUNT(*) FROM site_layouts;" | grep -qx 1
          MYSQL_PWD=layout_root mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root -N layout_ci -e "SELECT COUNT(*) FROM site_widget_instances;" | grep -qx 4
          MYSQL_PWD=layout_root mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root -N layout_ci -e "SELECT COUNT(*) FROM site_widget_placements;" | grep -qx 4